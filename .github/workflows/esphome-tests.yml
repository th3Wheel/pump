name: ESPHome Tests

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
  pull_request:
    branches:
      - main

jobs:
  validate-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESPHome
        run: pip install esphome

      - name: Prepare secrets file
        run: cp esphome/secrets.yaml.example esphome/secrets.yaml

      - name: Validate ESPHome config
        run: esphome config esphome/pool_pump.yaml
