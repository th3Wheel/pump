substitutions:
  device_name: pool-pump
  friendly_name: "Pool Pump"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: m5stack-atoms3

wifi:
  ssid: !secret securewifi_ssid
  password: !secret securewifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

# ---------------------------------------------------------------------------
# I2C – SSD1306 OLED display on the breadboard
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true

# ---------------------------------------------------------------------------
# 1-Wire – DS18B20 waterproof temperature probe on the breadboard
# ---------------------------------------------------------------------------
one_wire:
  - platform: gpio
    pin: GPIO8

# ---------------------------------------------------------------------------
# RS485 / Modbus – Century VGreen pump communication
# The Tail485 module is hardwired to GPIO26 (TX) and GPIO32 (RX) on the
# Atom S3 when plugged into its back-port connector.
# ---------------------------------------------------------------------------
uart:
  id: mod_bus
  tx_pin: GPIO26
  rx_pin: GPIO32
  baud_rate: 9600
  stop_bits: 1

modbus:
  id: century_pump
  uart_id: mod_bus

modbus_controller:
  - id: pump_controller
    modbus_id: century_pump
    address: 0x01
    update_interval: 5s

# ---------------------------------------------------------------------------
# Sensors
# ---------------------------------------------------------------------------
sensor:
  # -- Pump RPM (Modbus holding register 0x0003) --
  - platform: modbus_controller
    modbus_controller_id: pump_controller
    name: "Pump RPM"
    id: pump_rpm
    register_type: holding
    address: 0x0003
    unit_of_measurement: "RPM"
    state_class: measurement
    accuracy_decimals: 0

  # -- Pump Power (Modbus holding register 0x0004) --
  - platform: modbus_controller
    modbus_controller_id: pump_controller
    name: "Pump Power"
    id: pump_power
    register_type: holding
    address: 0x0004
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 0

  # -- Filter Pressure (analog 0–30 PSI transducer via voltage divider) --
  # Wiring: Sensor Yellow → 10 kΩ (series) → GPIO7; 20 kΩ (pull-down) from GPIO7 to GND.
  # Vout = Vin × 20k/(10k+20k) = Vin × 0.667, so GPIO reads 0.33–3.0 V for a 0.5–4.5 V signal.
  # multiply: 1.5 (= 1/0.667) restores the original sensor voltage before linear calibration.
  - platform: adc
    pin: GPIO7
    name: "Pool Filter Pressure"
    id: filter_pressure
    unit_of_measurement: "PSI"
    device_class: pressure
    state_class: measurement
    update_interval: 10s
    attenuation: 11db
    filters:
      - multiply: 1.5  # Correct for 10k/20k voltage divider
      - calibrate_linear:
          - 0.5 -> 0.0   # 0.5 V = 0 PSI (sensor minimum offset)
          - 4.5 -> 30.0  # 4.5 V = 30 PSI (sensor maximum)

  # -- Water/Ambient Temperature (DS18B20 on GPIO8 via 1-Wire) --
  # The DS18B20 reports in °C; the multiply + offset filters convert to °F for display.
  # With a single probe on the bus, address auto-discovery is used. Set 'address: 0x...'
  # (visible in ESPHome logs on first boot) when adding additional probes to the same wire.
  - platform: dallas_temp
    name: "Pool Equipment Temperature"
    id: equipment_temp
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement
    update_interval: 30s
    filters:
      - multiply: 1.8   # °C → °F step 1: scale
      - offset: 32.0    # °C → °F step 2: shift

# ---------------------------------------------------------------------------
# Binary Sensors – Safety Alerts
# ---------------------------------------------------------------------------
binary_sensor:
  # High pressure alert: filter needs backwashing when PSI > 25
  - platform: template
    name: "High Filter Pressure Alert"
    id: high_pressure_alert
    device_class: problem
    lambda: |-
      return id(filter_pressure).state > 25.0;

  # Prime-loss alert: PSI at or near 0 while pump is running at operational speed.
  # RPM threshold of 500 avoids false triggers during startup/shutdown transitions.
  # delayed_on: 30s ensures pressure has had time to build before triggering the alert.
  - platform: template
    name: "Pump Prime Loss Alert"
    id: prime_loss_alert
    device_class: problem
    filters:
      - delayed_on: 30s
    lambda: |-
      return id(pump_rpm).state >= 500 && id(filter_pressure).state < 1.0;

# ---------------------------------------------------------------------------
# Display – SSD1306 0.96" OLED (128×64, I2C) on the breadboard
# Shows live pump stats without needing a phone or Home Assistant dashboard.
# ---------------------------------------------------------------------------
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled_display
    lambda: |-
      it.printf(0, 0,  id(font_small), "PSI: %.1f", id(filter_pressure).state);
      it.printf(0, 20, id(font_small), "RPM: %.0f", id(pump_rpm).state);
      it.printf(0, 40, id(font_small), "Temp: %.1f F", id(equipment_temp).state);

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
